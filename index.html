function createAudioContext() {
  return new (window.AudioContext || window.webkitAudioContext)();
}

function playDrumRoll(duration = 2800) {
  const ctx = createAudioContext();
  const gainNode = ctx.createGain();
  gainNode.connect(ctx.destination);

  let time = ctx.currentTime;
  const totalBeats = Math.floor(duration / 80);
  for (let i = 0; i < totalBeats; i++) {
    const progress = i / totalBeats;
    const interval = 0.08 * (1 + progress * 1.5); // ralentit vers la fin
    const bufferSize = ctx.sampleRate * 0.04;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let j = 0; j < bufferSize; j++) {
      data[j] = (Math.random() * 2 - 1) * Math.exp(-j / (bufferSize * 0.15));
    }
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 180 + Math.random() * 40;
    filter.Q.value = 0.8;
    source.connect(filter);
    filter.connect(gainNode);
    gainNode.gain.setValueAtTime(0.35, time);
    source.start(time);
    time += interval * (1 - progress * 0.4);
  }
  return ctx;
}

function playVictorySound() {
  const ctx = createAudioContext();
  const master = ctx.createGain();
  master.gain.setValueAtTime(0.55, ctx.currentTime);
  master.connect(ctx.destination);

  // Explosion de pièces de casino : 3 couches simultanées

  // 1. Ping métallique principal (montée rapide)
  const pingFreqs = [880, 1100, 1320, 1760];
  pingFreqs.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq * 0.5, ctx.currentTime + i * 0.06);
    osc.frequency.exponentialRampToValueAtTime(freq, ctx.currentTime + i * 0.06 + 0.08);
    gain.gain.setValueAtTime(0.35, ctx.currentTime + i * 0.06);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.06 + 0.55);
    osc.connect(gain); gain.connect(master);
    osc.start(ctx.currentTime + i * 0.06);
    osc.stop(ctx.currentTime + i * 0.06 + 0.6);
  });

  // 2. Basse punchy (kick de casino)
  const kick = ctx.createOscillator();
  const kickGain = ctx.createGain();
  kick.type = 'sine';
  kick.frequency.setValueAtTime(160, ctx.currentTime);
  kick.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.18);
  kickGain.gain.setValueAtTime(0.7, ctx.currentTime);
  kickGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
  kick.connect(kickGain); kickGain.connect(master);
  kick.start(ctx.currentTime); kick.stop(ctx.currentTime + 0.25);

  // 3. Cliquetis de pièces (bruit court x5)
  for (let i = 0; i < 6; i++) {
    const bufSize = ctx.sampleRate * 0.06;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let j = 0; j < bufSize; j++) d[j] = (Math.random() * 2 - 1) * Math.exp(-j / (bufSize * 0.12));
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass'; filter.frequency.value = 3000 + Math.random() * 2000;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.22 + Math.random() * 0.15, ctx.currentTime);
    src.connect(filter); filter.connect(g); g.connect(master);
    src.start(ctx.currentTime + 0.05 + i * 0.09 + Math.random() * 0.04);
  }

  // 4. Accord de synth festif final
  const chordFreqs = [523, 659, 784];
  chordFreqs.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 1200;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + 0.28);
    gain.gain.setValueAtTime(0, ctx.currentTime + 0.28);
    gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.35);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.9);
    osc.connect(filter); filter.connect(gain); gain.connect(master);
    osc.start(ctx.currentTime + 0.28);
    osc.stop(ctx.currentTime + 1.0);
  });
}

async function shareLink(shareText, fallbackMsg) {
  const url = 'https://www.sahelmahel.com/';
  try {
    if (navigator.share) {
      await navigator.share({ title: 'Qui paye ?', text: shareText, url });
    } else {
      await navigator.clipboard.writeText(shareText + '\n' + url);
      alert(fallbackMsg);
    }
  } catch(e) {
    if (e.name !== 'AbortError') {
      await navigator.clipboard.writeText(shareText + '\n' + url);
      alert(fallbackMsg);
    }
  }
}


function getAvatar(name) {
  let hash = 0;
  for (let c of name) hash = (hash * 31 + c.charCodeAt(0)) % AVATARS.length;
  return AVATARS[hash];
}

function launchConfetti(theme) {
  const colors = theme === 'dark'
    ? ['#a855f7','#ec4899','#7c3aed','#f97316','#fbbf24','#34d399']
    : ['#8b5cf6','#ec4899','#fb7185','#f59e0b','#22c55e','#38bdf8'];
  const opts = { particleCount: 120, spread: 80, origin: { y: 0.6 }, colors };
  confetti({ ...opts, angle: 60, origin: { x: 0, y: 0.7 } });
  setTimeout(() => confetti({ ...opts, angle: 120, origin: { x: 1, y: 0.7 } }), 200);
  setTimeout(() => confetti({ ...opts, particleCount: 60, origin: { x: 0.5, y: 0.5 } }), 400);
}

function HeaderActions({ showHistory, setShowHistory, t, lang, setLang, theme, setTheme, isArabic, soundEnabled, setSoundEnabled }) {
  const [open, setOpen] = useState(false);
  const menuRef = useRef(null);
  const currentLang = LANG_OPTIONS.find(item => item.key === lang) || LANG_OPTIONS[0];

  useEffect(() => {
    function handleClickOutside(event) {
      if (menuRef.current && !menuRef.current.contains(event.target)) setOpen(false);
    }
    document.addEventListener('mousedown', handleClickOutside);
    return () => document.removeEventListener('mousedown', handleClickOutside);
  }, []);

  return (
    <div className={`flex gap-2 items-center ${isArabic ? "flex-row-reverse" : ""}`} dir="ltr">
      <button onClick={() => setSoundEnabled(v => !v)} className="icon-btn glass plain-text hover:bg-white/10 text-lg" title={soundEnabled ? "Son activé" : "Son désactivé"}>
        <span aria-hidden="true">{soundEnabled ? '🔊' : '🔇'}</span>
      </button>
      <button onClick={() => setShowHistory(!showHistory)} className="icon-btn glass plain-text hover:bg-white/10 text-sm" title={t.historyTitle}>🕐</button>

      <div className="relative" ref={menuRef}>
        <button
          onClick={() => setOpen(v => !v)}
          className="icon-btn glass plain-text hover:bg-white/10 text-lg"
          title={t.languageTitle}>
          <span aria-hidden="true">{currentLang.flag}</span>
        </button>
        {open && (
          <div className="lang-menu" dir="ltr" {...(isArabic ? { top: 'calc(100% + 8px)', left: 0, right: 'auto', position: 'absolute' } : { top: 'calc(100% + 8px)', right: 0, left: 'auto', position: 'absolute' })}>
            {LANG_OPTIONS.map((option) => (
              <button
                key={option.key}
                onClick={() => { setLang(option.key); setOpen(false); }}
                title={option.label}
                className={`lang-option ${lang === option.key ? 'active' : ''} plain-text`}
                style={{ justifyContent: 'center', padding: '10px 8px' }}>
                <span className="text-2xl leading-none">{option.flag}</span>
              </button>
            ))}
          </div>
        )}
      </div>

      <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="icon-btn glass plain-text hover:bg-white/10 text-lg" title={t.themeTitle}>
        <span aria-hidden="true">{theme === 'dark' ? '☀️' : '🌙'}</span>
      </button>
    </div>
  );
}

  const [shake, setShake] = useState(false);
  const [soundEnabled, setSoundEnabled] = useState(localStorage.getItem('qui-paye-sound') !== 'false');
  const [lang, setLang] = useState(localStorage.getItem('qui-paye-lang') || 'FR');
  const [theme, setTheme] = useState(localStorage.getItem('qui-paye-theme') || 'dark');
  const inputRef = useRef(null);
  const rollRef = useRef(null);
  const t = TEXT[lang];
  const isArabic = lang === 'AR';

  useEffect(() => {
    localStorage.setItem('qui-paye-sound', soundEnabled);
    document.body.classList.remove('theme-dark', 'theme-light');
    document.body.classList.add(theme === 'dark' ? 'theme-dark' : 'theme-light');
    localStorage.setItem('qui-paye-theme', theme);
  }, [theme]);

  useEffect(() => {
    localStorage.setItem('qui-paye-lang', lang);
    document.documentElement.lang = lang.toLowerCase();
    document.documentElement.dir = isArabic ? 'rtl' : 'ltr';
  }, [lang, isArabic]);

  const notifyShake = () => {
    setShake(true);
    setTimeout(() => setShake(false), 600);
  };

  const normalizedNames = useMemo(() => names.map(n => n.toLowerCase()), [names]);

  const addName = useCallback(() => {
    const trimmed = input.trim();
    if (!trimmed) return;
    if (normalizedNames.includes(trimmed.toLowerCase())) {
      notifyShake();
      return;
    }
    setNames(prev => [...prev, trimmed]);
    setInput('');
    inputRef.current?.focus();
  }, [input, normalizedNames]);

  const removeName = useCallback((name) => {
    setNames(prev => prev.filter(n => n !== name));
    if (winner === name) { setWinner(''); setPhase('idle'); }
  }, [winner]);

  const handleKey = (e) => { if (e.key === 'Enter') addName(); };

  const draw = useCallback(() => {
    if (names.length < 2) {
      notifyShake();
      return;
    }
    setPhase('rolling');
    setWinner('');
    const picked = names[Math.floor(Math.random() * names.length)];
    let drumCtx = null;
    if (soundEnabled) { try { drumCtx = playDrumRoll(2800); } catch(e) {} }
    let elapsed = 0;
    const totalDuration = 2800;
    const interval = 80;
    rollRef.current = setInterval(() => {
      elapsed += interval;
      const randomIdx = Math.floor(Math.random() * names.length);
      setCurrentName(names[randomIdx]);
      if (elapsed >= totalDuration) {
        clearInterval(rollRef.current);
        setCurrentName(picked);
        setWinner(picked);
        setPhase('winner');
        setShowHistory(true);
        setHistory(prev => [{
          name: picked,
          time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false}),
          emoji: EMOJIS[Math.floor(Math.random()*EMOJIS.length)]
        }, ...prev.slice(0, 9)]);
        setTimeout(() => launchConfetti(theme), 100);
        if (soundEnabled) { try { playVictorySound(); } catch(e) {} }
      }
    }, interval);
  }, [names, theme, lang, isArabic]);

  useEffect(() => () => clearInterval(rollRef.current), []);

  const reset = () => { setPhase('idle'); setWinner(''); setCurrentName(''); };
  const handleShare = async () => {
    setSharing(true);
    await shareLink(t.shareText, t.shareFallback);
    setSharing(false);
  };

  return (
    <div className="w-full max-w-sm mx-auto p-4 flex flex-col gap-4" style={{minHeight:'100vh', paddingTop:'2rem', paddingBottom:'2rem'}} dir={isArabic ? 'rtl' : 'ltr'}>
      <div className="flex items-start justify-between gap-3">
        <div>
          <h1 className="text-3xl font-black plain-text tracking-tight whitespace-nowrap">{t.title}</h1>
          <p className="muted text-xs mt-0.5">{t.subtitle}</p>
        </div>
        <div dir="ltr"><HeaderActions
          showHistory={showHistory}
          setShowHistory={setShowHistory}
          t={t}
          lang={lang}
          setLang={setLang}
          theme={theme}
          setTheme={setTheme}
          isArabic={isArabic}
          soundEnabled={soundEnabled}
          setSoundEnabled={setSoundEnabled}
        />
        </div>
      </div>

      <div className="glass rounded-2xl p-4 flex flex-col gap-3">
        <p className="title-soft text-xs font-semibold uppercase tracking-widest">{t.addFriends}</p>
        <div className={`flex gap-2 ${shake ? 'shake' : ''} ${isArabic ? 'flex-row-reverse' : ''}`}>
          <input ref={inputRef} value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKey}
            placeholder={t.placeholder}
            className="input-field flex-1 px-4 py-2.5 rounded-xl text-sm font-medium" />
          <button onClick={addName}
            className="btn-primary w-11 h-11 rounded-xl flex items-center justify-center text-white font-bold text-xl flex-shrink-0 shadow-lg"
            aria-label={t.addFriends}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="12" y1="1" x2="12" y2="5" strokeLinecap="round"/><line x1="10" y1="3" x2="14" y2="3" strokeLinecap="round"/></svg>
          </button>
        </div>
        {names.length > 0 && (
          <div className={`flex flex-wrap gap-2 pt-1 ${isArabic ? 'justify-end' : ''}`}>
            {names.map(n => <Tag key={n} name={n} onRemove={removeName} />)}
          </div>
        )}
        {names.length < 2 && (
          <p className="muted text-xs text-center">{t.helper}</p>
        )}
      </div>

      <SlotDisplay phase={phase} currentName={currentName} winner={winner} t={t} isArabic={isArabic} />

      <div className="flex flex-col gap-2">
        <button onClick={draw} disabled={phase === 'rolling'}
          className="btn-primary w-full py-4 rounded-2xl text-white font-black text-lg tracking-wide shadow-xl disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2"
          aria-label={t.cta}>
          {phase === 'rolling' ? (
            <><span className="animate-spin text-xl">🎲</span><span>{t.drawing}</span></>
          ) : (
            <><span>{t.cta}</span></>
          )}
        </button>
        <div className={`flex gap-2 ${isArabic ? 'flex-row-reverse' : ''}`}>
          <button onClick={() => window.open('QR_code.pdf', '_blank')}
            className="flex-1 py-3 rounded-xl title-soft font-semibold text-sm glass hover:bg-purple-500/20 transition-all flex items-center justify-center gap-1.5">
            <span>📄</span><span>{t.qrcode}</span>
          </button>
          <button onClick={handleShare} disabled={sharing}
            className="flex-1 py-3 rounded-xl title-soft font-semibold text-sm glass hover:bg-purple-500/20 transition-all disabled:opacity-60 flex items-center justify-center gap-1.5">
            {sharing ? <span className="animate-spin">⏳</span> : <span>🔗</span>}
            <span>{t.share}</span>
          </button>
        </div>
      </div>

      {history.length > 0 && (
        <div className="glass rounded-2xl p-4 flex flex-col gap-3">
          <div className="flex items-center justify-between">
            <p className="title-soft text-xs font-semibold uppercase tracking-widest">{t.history}</p>
            <button onClick={() => setShowHistory(!showHistory)} className="muted text-xs hover:text-purple-400 transition-all">
              {showHistory ? '▲' : '▼'}
            </button>
          </div>
          {showHistory && (
            <div className="flex flex-col gap-2 max-h-48 overflow-y-auto pr-1">
              {history.map((h, i) => (
                <div key={i} className="history-card flex items-center justify-between px-3 py-2 rounded-xl subtle-bg">
                  <div className={`flex items-center gap-2 ${isArabic ? 'flex-row-reverse' : ''}`}>
                    <span className="plain-text font-semibold text-sm">{h.name}</span>
                  </div>
                  <span className="muted text-xs">{h.time}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {winner && <span className="sr-only">{t.resultLabel(winner)}</span>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
